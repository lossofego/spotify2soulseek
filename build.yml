name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
          pip install pystray pillow plyer unidecode
      
      - name: Build exe
        run: pyinstaller spotify2slsk.spec
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spotify2slsk-windows
          path: dist/spotify2slsk.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
          pip install pystray pillow plyer unidecode
      
      - name: Build app
        run: pyinstaller spotify2slsk.spec
      
      - name: Zip the app
        run: |
          cd dist
          zip -r spotify2slsk-mac.zip spotify2slsk
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spotify2slsk-mac
          path: dist/spotify2slsk-mac.zip

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: spotify2slsk-windows
          path: ./windows
      
      - name: Download Mac build
        uses: actions/download-artifact@v4
        with:
          name: spotify2slsk-mac
          path: ./mac
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./windows/spotify2slsk.exe
            ./mac/spotify2slsk-mac.zip
